spring.application.name=receipt-splitter-core

# Datasource values are injected by docker-compose via environment variables.
# The ${VAR:default} fallbacks let the service run against a locally-exposed
# Postgres outside of docker-compose without extra configuration.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/receiptdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:receipt}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:receipt123}

# Auto-update schema from JPA entities is sufficient for a workshop demo.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

server.port=8080
