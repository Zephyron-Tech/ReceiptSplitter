# Orchestrates the three-tier demo stack (db + ocr-service + core-service).
# The frontend is intentionally NOT part of this compose file — it runs via
# `npm run dev` inside /frontend to preserve hot-reload during live demo.

services:
  db:
    image: postgres:15-alpine
    container_name: receipt-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  ocr-service:
    build: ./ocr-service
    container_name: receipt-ocr
    ports:
      - "8001:8001"
    restart: unless-stopped

  core-service:
    build: ./core-service
    container_name: receipt-core
    ports:
      - "8080:8080"
    environment:
      # Inside the compose network the Postgres host resolves by service name "db".
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
